<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Metrónomo Sync</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Barra de estado de conexión / sync -->
    <div id="status-bar">
      <span id="sync-status">Conectando...</span>
    </div>

    <!-- ── Lobby ─────────────────────────────────────────────────────── -->
    <section id="lobby" class="screen hidden">
      <h1>Metrónomo <span>Sync</span></h1>

      <!-- Crear sesión -->
      <div class="card">
        <h2>Crear sesión</h2>
        <div class="row">
          <div class="field">
            <label for="create-bpm">BPM</label>
            <input type="number" id="create-bpm" value="120" min="20" max="300" />
          </div>
          <div class="field">
            <label for="create-beats">Compás</label>
            <select id="create-beats">
              <option value="2">2/4</option>
              <option value="3">3/4</option>
              <option value="4" selected>4/4</option>
              <option value="6">6/8</option>
              <option value="8">7/8</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-create">Crear sesión</button>
      </div>

      <div class="divider">o</div>

      <!-- Unirse a sesión existente -->
      <div class="card">
        <h2>Unirse a sesión</h2>
        <input
          type="text"
          id="join-code"
          placeholder="Código de sesión"
          maxlength="6"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="btn btn-secondary" id="btn-join">Unirse</button>
      </div>
    </section>

    <!-- ── Sesión activa ──────────────────────────────────────────────── -->
    <section id="session" class="screen hidden">

      <!-- Encabezado -->
      <div id="session-header">
        <div id="session-info">
          <span>Sesión: <strong id="session-code" title="Click para copiar"></strong></span>
          <span id="client-count">1 músico</span>
        </div>
        <button class="btn btn-ghost" id="btn-leave">Salir</button>
      </div>

      <!-- Círculo de beat + tap tempo -->
      <div id="beat-ring">
        <div id="beat-circle">
          <div id="bpm-display">120</div>
          <div id="beat-label">BPM</div>
          <div id="tap-hint">tap para marcar tempo</div>
        </div>
      </div>

      <!-- Indicadores de beat en el compás -->
      <div id="beat-dots"></div>

      <!-- Control de BPM -->
      <div id="bpm-control">
        <button class="bpm-btn" id="bpm-minus">−</button>
        <input type="range" id="bpm-slider" min="20" max="300" value="120" />
        <button class="bpm-btn" id="bpm-plus">+</button>
      </div>

      <!-- Iniciar / Detener -->
      <button class="btn btn-primary" id="btn-toggle" data-running="false">
        ▶ Iniciar
      </button>

    </section>

  </div>

  <!-- socket.io se sirve desde el propio servidor -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/clock-sync.js"></script>
  <script src="js/audio-engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
